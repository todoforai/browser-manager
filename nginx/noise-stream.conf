# browser-manager Noise TCP stream — L4 passthrough
# Public port: 4120. Internal ports: 8091/8093 (blue/green slots).
# Noise has no SNI, so nginx stream routing is by port only.
# Supports a stable public port and slot-based deploys.
#
# Include from top-level nginx.conf via:
#   stream { include /etc/nginx/streams-enabled/*.conf; }

upstream browser_noise {
    server 127.0.0.1:8087 max_fails=2 fail_timeout=5s;
    server 127.0.0.1:8089 max_fails=2 fail_timeout=5s;
}

server {
    listen 4120;
    proxy_pass browser_noise;
    proxy_connect_timeout 5s;
    proxy_timeout 300s;
}
