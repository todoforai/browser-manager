# browser-manager Noise TCP stream — L4 passthrough
# Public endpoint: browser.todofor.ai:4120. Internal: 127.0.0.1:8087.
# Noise protocol has no SNI, so routing is by port only (no subdomain needed).
# This stream exists primarily for rolling-deploy and a stable public endpoint.
#
# Include from top-level nginx.conf via:
#   stream { include /etc/nginx/streams-enabled/*.conf; }

upstream browser_noise {
    server 127.0.0.1:8087 max_fails=2 fail_timeout=5s;
    # server 127.0.0.1:8089 down;   # second slot for zero-downtime deploys
}

server {
    listen 4120;
    proxy_pass browser_noise;
    proxy_connect_timeout 5s;
    proxy_timeout 300s;
}
