# browser-manager REST upstream — two slots for zero-downtime rolling deploys.
# Serves both bm.todofor.ai and browser.todofor.ai (the legacy `browsing`
# service that previously owned browser.todofor.ai has been retired).
upstream browser_manager {
    server 127.0.0.1:8600 max_fails=2 fail_timeout=5s;
    server 127.0.0.1:8602 max_fails=2 fail_timeout=5s;
}

# CDP WebSocket proxy upstream — slots 8620/8622 (REST port + 20). Kept in
# lockstep with browser_manager by deploy.sh's upstream flip. Auth is enforced
# in cdp-proxy.ts (CDP_REQUIRE_AUTH=true) via the ?token= query param.
upstream browser_manager_cdp {
    server 127.0.0.1:8620 max_fails=2 fail_timeout=5s;
    server 127.0.0.1:8622 max_fails=2 fail_timeout=5s;
}

server {
    listen 80;
    listen [::]:80;
    server_name bm.todofor.ai browser.todofor.ai;

    # ACME challenges over plain HTTP
    location /.well-known/acme-challenge/ { root /var/www/html; }

    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bm.todofor.ai browser.todofor.ai;

    client_max_body_size 50M;

    ssl_certificate /etc/letsencrypt/live/bm.todofor.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bm.todofor.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;

    # CDP WebSocket proxy — authenticated via ?token= (cdp-proxy.ts enforces
    # ownership when CDP_REQUIRE_AUTH=true). Lets agent-browser / Playwright
    # connect directly to wss://bm.todofor.ai/cdp/<sessionId>?token=<token>.
    location ^~ /cdp/ {
        # Token rides in ?token= — keep it out of access logs.
        access_log off;
        proxy_pass http://browser_manager_cdp;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Admin UI is loopback-only (127.0.0.1:8610). Block known admin paths at the edge.
    location ^~ /admin/      { return 404; }
    location =  /admin       { return 404; }

    # REST API
    location / {
        proxy_pass http://browser_manager;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 300s;
    }
}
