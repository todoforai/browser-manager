# browser-manager REST upstream — two slots for zero-downtime rolling deploys.
# Coexists with `browsing` on the same host (which owns browser.todofor.ai
# and ports 8085/8086).
upstream browser_manager {
    server 127.0.0.1:8090 max_fails=2 fail_timeout=5s;
    server 127.0.0.1:8092 max_fails=2 fail_timeout=5s;
}

server {
    listen 80;
    listen [::]:80;
    server_name bm.todofor.ai;

    # ACME challenges over plain HTTP
    location /.well-known/acme-challenge/ { root /var/www/html; }

    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bm.todofor.ai;

    client_max_body_size 50M;

    ssl_certificate /etc/letsencrypt/live/bm.todofor.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bm.todofor.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;

    # CDP WebSocket (raw passthrough, long-lived)
    location ~ ^/cdp/ {
        proxy_pass http://browser_manager;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # REST API
    location / {
        proxy_pass http://browser_manager;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 300s;
    }
}
